<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rich BFQ Mahsuloti | Detail</title>
    <meta
      name="description"
      content="Rich brendi biologik faol qo'shimchalari tarkibi, qo'llanilishi, dozasi va saqlash shartlari."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Crown Rich home"><img class="brand-logo" src="images/crich.png" alt="Crown Rich logo" /></a>
        <button class="menu-toggle" id="menuToggle" aria-expanded="false" aria-label="Menyuni ochish"><span></span><span></span><span></span></button>
        <nav class="nav" id="navMenu">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="services.html" class="active">Services</a>
          <a href="news.html">News</a>
          <a href="contact.html">Contact</a>
        </nav>
        <div class="header-actions">
          <button class="icon-btn" id="themeToggle" aria-label="Dark mode yoqish/o'chirish"><i class="fa-solid fa-moon"></i></button>
          <button class="btn btn-gold open-modal" data-modal-target="#quickRequestModal">Tezkor so'rov</button>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero reveal" data-product-detail>
        <div class="container">
          <p class="eyebrow" data-product-type>BFQ</p>
          <h1 data-product-name>Crown Rich Mahsulot</h1>
          <p class="lead" data-product-purpose>Mahsulot maqsadi yuklanmoqda...</p>
          <p class="form-message" data-product-message aria-live="polite"></p>
        </div>
      </section>

      <section class="section reveal" data-product-detail>
        <div class="container">
          <div class="grid cards-3">
            <article class="card">
              <h3>Tarkibi</h3>
              <p data-product-composition></p>
            </article>
            <article class="card">
              <h3>Qo'llanilishi</h3>
              <p data-product-usage></p>
            </article>
            <article class="card">
              <h3>Xususiyati</h3>
              <p data-product-feature></p>
            </article>
          </div>

          <div class="grid cards-3" style="margin-top: 1rem;">
            <article class="card">
              <h3>Dozasi</h3>
              <p data-product-dosage></p>
            </article>
            <article class="card">
              <h3>Saqlash shartlari</h3>
              <p data-product-storage></p>
            </article>
            <article class="card">
              <h3>Ishlab chiqaruvchi</h3>
              <p data-product-maker></p>
            </article>
          </div>

          <article class="panel" style="margin-top: 1rem;">
            <h3>Sertifikatlash</h3>
            <p data-product-certification></p>
          </article>

          <a class="btn btn-outline" href="services.html" style="margin-top: 1rem;">Katalogga qaytish</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>© <span id="year"></span> Crown Rich Korporatsiyasi. Barcha huquqlar himoyalangan.</p>
      </div>
    </footer>

    <button class="back-top" id="backTop" aria-label="Yuqoriga qaytish"><i class="fa-solid fa-arrow-up"></i></button>

    <div class="modal" id="quickRequestModal" aria-hidden="true">
      <div class="modal-content">
        <button class="modal-close" aria-label="Yopish">×</button>
        <h3>Tezkor so'rov</h3>
        <form data-validate>
          <label>Ism <input type="text" name="name" required /></label>
          <label>Telefon <input type="tel" name="phone" required /></label>
          <label>Xabar <textarea name="message" rows="4" required></textarea></label>
          <button type="submit" class="btn btn-gold">Yuborish</button>
          <p class="form-message" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
